<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Sign In</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #e5e7eb;
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #5b9dff;
      color: white;
      font-weight: 600;
      cursor: pointer;

      /* NEW: smooth hover + click feedback */
      transition: all 0.2s ease;
    }

    button:hover {
      background: #3b82f6;
      /* noticeably darker blue */
      transform: translateY(-1px);
      /* tiny lift */
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.3);
    }

    button:active {
      transform: translateY(0);
      background: #2563eb;
      /* even deeper when pressed */
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.4);
    }

    /* Optional: disable hover/click effect when form is invalid or submitting */
    button:disabled,
    button[disabled] {
      background: #9abffc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error {
      color: #ef4444;
      font-size: 13px;
      margin-bottom: 10px;
      display: none;
    }

    .success {
      color: #16a34a;
      font-size: 13px;
      margin-bottom: 10px;
      display: none;
    }

    .link {
      margin-top: 14px;
      font-size: 13px;
      text-align: center;
    }

    .link a {
      color: #5b9dff;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>Sign In</h1>

    <!-- Error message -->
    <div class="error" id="errorMsg">
      Invalid email or password. Please try again.
    </div>

    <div class="success" id="successMsg">
      Account created successfully. Please sign in.
    </div>



    <form id="signinForm">
      <input type="email" id="email" placeholder="Email" required />
      <input type="password" id="password" placeholder="Password" required />
      <button type="submit">Sign In</button>
    </form>


    <div class="link">
      Don’t have an account?
      <a href="index.html">Sign up</a>
    </div>
  </div>
  <script src="js/signin.js"></script>

</body>

</html>
