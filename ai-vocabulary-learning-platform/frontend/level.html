<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Select Level</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/select.css">
</head>

<body>
  <div class="container">
    <div class="card">
      <h1>Select Your Level</h1>
      <p class="subtitle">Choose your current language level.</p>

      <div class="grid-level" id="levelOptions">
        <button data-value="Beginner">Beginner</button>
        <button data-value="Intermediate">Intermediate</button>
        <button data-value="Advanced">Advanced</button>
      </div>

      <button id="finishBtn" disabled>Finish →</button>
    </div>
  </div>
  <script src="js/level.js"></script>
</body>

</html>
